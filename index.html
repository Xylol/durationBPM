<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duration / BPM Metronome</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
    }
    body {
      max-width: 26rem;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 {
      font-size: 1.3rem;
    }
    .row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
      padding: 0.4rem;
      border-radius: 0.4rem;
    }
    .row.active {
      background: #2e7d3233;
      outline: 2px solid #2e7d32;
    }
    .row label {
      display: flex;
      flex-direction: column;
      font-size: 0.75rem;
      gap: 0.15rem;
      flex: 1;
    }
    .row input {
      font-size: 1.1rem;
      width: 100%;
      padding: 0.3rem;
      box-sizing: border-box;
    }
    button {
      font-size: 1.1rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
    }
    .row .remove {
      align-self: flex-end;
    }
    #add {
      margin: 0.5rem 0 1.5rem;
    }
    #play {
      width: 100%;
      font-size: 1.4rem;
      padding: 0.7rem;
    }
  </style>
</head>
<body>
  <h1>Duration / BPM Metronome</h1>
  <div id="rows"></div>
  <button id="add" type="button">＋ Add segment</button>
  <button id="play" type="button">▶ Play</button>
  <script src="main.js"></script>
</body>
</html>
